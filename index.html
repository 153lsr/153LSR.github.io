<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>致我最可爱的妹妹思敏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fad0c4);
            font-family: 'Arial', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
            position: relative;
        }
        
        .container {
            max-width: 800px;
            padding: 30px;
            text-align: center;
            z-index: 2;
            position: relative;
        }
        
        .header {
            margin-bottom: 40px;
            animation: fadeInDown 1s ease;
        }
        
        .title {
            font-size: 3.5rem;
            margin-bottom: 20px;
            color: #ff6b6b;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }
        
        .subtitle {
            font-size: 1.8rem;
            color: #6a5acd;
            margin-bottom: 30px;
            animation: pulse 2s infinite;
        }
        
        .content {
            background: rgba(255, 255, 255, 0.85);
            border-radius: 20px;
            padding: 30px;
            margin: 30px 0;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(10px);
            border: 2px solid #ffb6c1;
            animation: fadeInUp 1.5s ease;
        }
        
        .message {
            font-size: 1.4rem;
            line-height: 1.8;
            margin-bottom: 30px;
        }
        
        .highlight {
            color: #ff6b6b;
            font-weight: bold;
            background: linear-gradient(45deg, #ff6b6b, #6a5acd);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .signature {
            font-size: 2rem;
            margin-top: 30px;
            color: #6a5acd;
            font-family: 'KaiTi', serif;
        }
        
        .heart {
            display: inline-block;
            color: #ff6b6b;
            animation: heartbeat 1.2s infinite;
            font-size: 2rem;
        }
        
        .gift-box {
            width: 150px;
            height: 150px;
            margin: 30px auto;
            position: relative;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.5s;
        }
        
        .gift-box:hover {
            transform: rotateY(180deg);
        }
        
        .box {
            width: 100%;
            height: 100%;
            position: absolute;
            backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 5rem;
        }
        
        .front {
            background: linear-gradient(45deg, #ffb6c1, #ff6b6b);
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        
        .back {
            background: linear-gradient(45deg, #87ceeb, #ffb6c1);
            border-radius: 15px;
            transform: rotateY(180deg);
            font-size: 1.5rem;
            padding: 20px;
            color: #333;
        }
        
        .floating-hearts {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 1;
        }
        
        .floating-heart {
            position: absolute;
            font-size: 2rem;
            color: #ff6b6b;
            animation: float 8s infinite linear;
            opacity: 0;
        }
        
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
            100% {
                transform: scale(1);
            }
        }
        
        @keyframes heartbeat {
            0% {
                transform: scale(1);
            }
            14% {
                transform: scale(1.3);
            }
            28% {
                transform: scale(1);
            }
            42% {
                transform: scale(1.3);
            }
            70% {
                transform: scale(1);
            }
        }
        
        @keyframes float {
            0% {
                transform: translateY(100vh) translateX(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) translateX(100px) rotate(360deg);
                opacity: 0;
            }
        }
        
        @media (max-width: 768px) {
            .title {
                font-size: 2.5rem;
            }
            .subtitle {
                font-size: 1.4rem;
            }
            .message {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="floating-hearts" id="floatingHearts"></div>
    
    <div class="container">
        <div class="header">
            <h1 class="title">致我最亲爱的妹妹</h1>
            <h2 class="subtitle">李思敏小可爱</h2>
        </div>
        
        <div class="content">
            <p class="message">
                亲爱的思敏妹妹：<br><br>
                昨天收到你的生日红包，姐姐心里暖暖的，满满的感动！<br><br>
                虽然只是一个小小的红包，但代表的是你对姐姐满满的<span class="highlight">爱和关心</span>。<br><br>
                从小到大，你一直是那个可爱的<span class="highlight">小天使</span>，总是用你的纯真和善良温暖着姐姐。<br><br>
                有你这样的妹妹，是姐姐这辈子最大的<span class="highlight">幸福</span>之一！
            </p>
            
            <div class="gift-box" id="giftBox">
                <div class="box front">🎀</div>
                <div class="box back">谢谢你，我的小棉袄！</div>
            </div>
            
            <p class="message">
                愿你永远像现在这样<span class="highlight">快乐、健康、美丽</span>！<br>
                无论你走到哪里，都要记得你有一个永远<span class="highlight">支持你、爱你</span>的姐姐！
            </p>
            
            <div class="signature">
                <span class="heart">💕</span> 爱你的姐姐<br>
                <span style="font-size: 1.2rem;">永远的小太阳</span>
            </div>
        </div>
    </div>

    <script>
        // 创建浮动的心形
        const heartsContainer = document.getElementById('floatingHearts');
        for (let i = 0; i < 20; i++) {
            const heart = document.createElement('div');
            heart.classList.add('floating-heart');
            heart.innerHTML = '💕';
            heart.style.left = `${Math.random() * 100}%`;
            heart.style.animationDuration = `${Math.random() * 5 + 5}s`;
            heart.style.animationDelay = `${Math.random() * 5}s`;
            heart.style.fontSize = `${Math.random() * 20 + 20}px`;
            heartsContainer.appendChild(heart);
        }
        
        // 礼物盒点击效果
        const giftBox = document.getElementById('giftBox');
        giftBox.addEventListener('click', function() {
            // 创建更多心形
            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.classList.add('floating-heart');
                    heart.innerHTML = ['💕', '💖', '💗', '💞', '💓'][Math.floor(Math.random() * 5)];
                    heart.style.left = `${Math.random() * 100}%`;
                    heart.style.animationDuration = `${Math.random() * 3 + 2}s`;
                    heart.style.fontSize = `${Math.random() * 20 + 20}px`;
                    heartsContainer.appendChild(heart);
                    
                    // 几秒后移除心形，避免过多元素
                    setTimeout(() => {
                        heart.remove();
                    }, 5000);
                }, i * 150);
            }
        });
        
        // 添加一些泡泡效果
        document.addEventListener('DOMContentLoaded', function() {
            const bubbles = 30;
            const body = document.body;
            
            for (let i = 0; i < bubbles; i++) {
                const bubble = document.createElement('div');
                bubble.style.position = 'fixed';
                bubble.style.width = `${Math.random() * 40 + 10}px`;
                bubble.style.height = bubble.style.width;
                bubble.style.border = '2px solid #ffb6c1';
                bubble.style.borderRadius = '50%';
                bubble.style.top = `${Math.random() * 100}vh`;
                bubble.style.left = `${Math.random() * 100}vw`;
                bubble.style.opacity = Math.random() * 0.5 + 0.2;
                bubble.style.zIndex = '1';
                bubble.style.animation = `float ${Math.random() * 10 + 10}s infinite linear`;
                body.appendChild(bubble);
            }
        });
    </script>
</body>
</html>
